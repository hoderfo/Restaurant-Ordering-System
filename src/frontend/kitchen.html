<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="kds-body">
    <header class="app-header">
        <h1>Kitchen Display System</h1>
        <div class="user-actions">
            <a href="/" class="btn-text" style="color: white; margin-right: 20px;">Back to Floor Plan</a>
            <span id="kds-user-info">Not Logged In</span>
        </div>
    </header>

    <main class="kds-main" id="kds-main">
        <div class="kds-header">
            <h2>Active Orders</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="last-updated" style="font-size: 0.9em; color: #666;">Last updated: --:--</span>
                <button id="refresh-kds" class="btn-secondary">Refresh Now</button>
            </div>
        </div>
        
        <div id="kds-grid" class="kds-grid">
            <!-- Order tickets will be injected here -->
        </div>
    </main>

    <div id="login-overlay" class="modal hidden">
        <div class="modal-content">
            <h2>Kitchen Login Required</h2>
            <p>Please log in from the main Floor Plan page with an account that has kitchen access, then refresh this page.</p>
            <a href="/" class="btn-primary" style="display: inline-block; text-align: center; text-decoration: none; margin-top: 15px;">Go to Login</a>
        </div>
    </div>

    <script src="kitchen.js"></script>
</body>
</html>
